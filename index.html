<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LabIntake">
  <title>LabIntake — Lab Intake Log</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles5.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .stat-pill{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer}
    .stat-pill.total  {background:#dbeafe;color:#1e40af}
    .stat-pill.open   {background:#fef9c3;color:#854d0e}
    .stat-pill.overdue{background:#fee2e2;color:#991b1b}
    .stat-pill.today  {background:#fef3c7;color:#92400e}
    .stat-pill.sent   {background:#dcfce7;color:#166534}
    .case-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
    .case-table th{padding:11px 12px;background:#f8fafc;border-bottom:2px solid #e2e8f0;color:#475569;font-weight:700;text-align:left;cursor:pointer;white-space:nowrap;user-select:none}
    .case-table th:hover{background:#f1f5f9}
    .case-table td{padding:11px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
    .case-table tr:last-child td{border-bottom:none}
    .case-table tr.row-urgent td{background:#fff5f5}
    .case-table tr.row-warning td{background:#fffbeb}
    .case-table tbody tr:hover td{background:#f8fafc;transition:background .1s}
    @keyframes rowFlash{0%{background:#bbf7d0}100%{background:transparent}}
    .new-row td{animation:rowFlash 3s ease-out forwards}
    .cd-pill{display:inline-block;padding:5px 11px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap;min-width:75px;text-align:center}
    .st-badge{display:inline-block;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:700;white-space:nowrap}
    .act-btn{border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;margin-left:3px}
    .act-btn:active{transform:scale(.93)}
    .btn-sent{background:#16a34a;color:#fff}
    .btn-edit{background:#2563eb;color:#fff}
    .btn-pdf {background:#7c3aed;color:#fff}
    .btn-del {background:#dc2626;color:#fff}
    .edit-banner{background:#dbeafe;color:#1e40af;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:12px;display:none;border:1px solid #bfdbfe}
    .edit-banner.active{display:flex;align-items:center;gap:8px}
    .search-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .search-row input{flex:1;min-width:150px;height:40px;padding:0 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;font:inherit}
    .search-row select{height:40px;padding:0 10px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;font:inherit;background:#fff}
    .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
    .sec-hdr h2{margin:0;font-size:18px}
    .float-fab{position:fixed;bottom:20px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
    .fab-btn{display:flex;align-items:center;gap:8px;padding:11px 16px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.25);white-space:nowrap;font-family:inherit}
    .fab-btn:active{transform:scale(.95)}
    .table-wrap{overflow-x:auto;border:1px solid #e2e8f0;border-radius:10px}
    .monitor-empty{text-align:center;padding:48px;color:#94a3b8;font-size:14px}
    #syncStatus{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:700;display:inline-block}
    .sync-ok{background:#dcfce7;color:#16a34a}
    .sync-loading{background:#dbeafe;color:#2563eb}
    .sync-err{background:#fee2e2;color:#dc2626}
  </style>
</head>
<body>

<header class="topbar">
  <h1>LabIntake</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="syncStatus" class="sync-ok" style="display:none">✓ Synced</span>
    <span id="countBadge" class="badge">0 cases</span>
  </div>
</header>

<main>

  <!-- ===== FORM ===== -->
  <section class="card" id="formCard">
    <div class="edit-banner" id="editBanner">✏️ <span>Editing entry — make changes and save to update</span></div>
    <h2 id="formTitle">New Entry</h2>
    <form id="entryForm" autocomplete="off">
      <input type="hidden" id="editingId">

      <div class="row">
        <label>Entry date
          <input type="date" id="fechaEntrada" name="fechaEntrada" required>
        </label>
      </div>

      <div class="row">
        <label>Doctor / Clinic
          <select id="doctorSelect" name="doctor" required>
            <option value="">— select —</option>
          </select>
        </label>
      </div>

      <div class="row-actions">
        <button type="button" id="toggleNewDoc" class="link">+ Add new doctor / clinic</button>
      </div>
      <div class="row" id="newDocRow" hidden>
        <label>Name
          <input type="text" id="newDocInput" placeholder="e.g. Dr. Smith" autocomplete="off">
        </label>
        <div class="row-buttons">
          <button type="button" id="saveDocBtn" class="primary-sm">Save</button>
          <button type="button" id="cancelDocBtn" class="link">Cancel</button>
        </div>
      </div>

      <div class="row">
        <label>Patient name
          <input type="text" id="pacienteInput" name="paciente" placeholder="Patient name" required autocomplete="name">
        </label>
      </div>

      <div class="row">
        <label>Restoration type
          <input type="text" id="trabajoInput" name="trabajo" value="crown" list="workTypes" placeholder="e.g. crown, zirconia, bridge…" required>
          <datalist id="workTypes">
            <option value="crown"><option value="Crown preparation"><option value="Vita multilayer zirconia">
            <option value="Crown on implant"><option value="Screw retained crown (SRC)"><option value="Custom abutment">
            <option value="Provisional / temporary"><option value="Veneer"><option value="Bridge (preparation)">
            <option value="Bridge on implants"><option value="Acrylic flipper"><option value="Overdenture">
            <option value="Hybrid restoration (All-on-X)"><option value="Essix retainer"><option value="Waxup">
            <option value="Inlay / Onlay">
          </datalist>
        </label>
      </div>

      <div class="row">
        <label>Delivery date
          <input type="date" id="fechaEntrega" name="fechaEntrega" required>
        </label>
      </div>

      <div class="row">
        <label>Materials <span class="optional">(optional)</span>
          <div class="material-input">
            <input type="text" id="matName" placeholder="Material name (e.g. Zirconia disc Vita)">
            <input type="number" id="matQty" placeholder="Qty" min="0" step="any" inputmode="decimal">
            <input type="text" id="matUnit" placeholder="Unit">
            <button type="button" id="addMatBtn" class="primary-sm">+</button>
          </div>
          <ul id="matList" class="mat-list" hidden></ul>
        </label>
      </div>

      <div class="row">
        <label>Notes <span class="optional">(optional)</span>
          <textarea id="entryNotes" rows="3" placeholder="Shade, important info, patient preferences…"></textarea>
        </label>
        <label class="check-row">
          <input type="checkbox" id="entryImportant">
          <span>Mark as important ⚠️</span>
        </label>
      </div>

      <div class="form-action-row">
        <button type="button" id="cancelEditBtn" class="link" hidden>✕ Cancel edit</button>
      </div>

      <button type="submit" class="primary" id="saveBtn">💾 Save entry</button>
    </form>
  </section>

  <!-- ===== MONITOR ===== -->
  <section class="card" id="monitorCard">
    <div class="sec-hdr">
      <h2>📋 Case Monitor</h2>
      <span id="monitorCount" style="color:#64748b;font-size:12px;font-weight:600"></span>
    </div>

    <div class="stats-bar" id="statsBar">
      <span class="stat-pill total">📋 0 total</span>
    </div>

    <div class="search-row">
      <input type="search" id="searchInput" placeholder="🔍 Search patient, doctor, work…">
      <select id="filterSelect">
        <option value="all">All</option>
        <option value="open">🔵 Open</option>
        <option value="overdue">🔴 Overdue</option>
        <option value="today">🟡 Due today</option>
        <option value="sent">✅ Delivered</option>
      </select>
    </div>

    <div class="table-wrap">
      <table class="case-table" id="caseTable">
        <thead>
          <tr>
            <th data-sort="doctor">👨‍⚕️ Doctor ↕</th>
            <th data-sort="paciente">🧑 Patient ↕</th>
            <th data-sort="trabajo">🦷 Work ↕</th>
            <th data-sort="entrega">⏰ Due in ↕</th>
            <th data-sort="edad">📅 Age ↕</th>
            <th>Status</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="caseBody"></tbody>
      </table>
    </div>
    <p id="monitorEmpty" class="monitor-empty" hidden>No cases yet. Add the first order above ↑</p>
  </section>

</main>

<!-- FAB -->
<div class="float-fab">
  <button class="fab-btn" id="fabSync"  style="background:#0891b2">☁️ <span>Sync</span></button>
  <button class="fab-btn" id="fabExcel" style="background:#16a34a">📊 <span>Excel</span></button>
  <button class="fab-btn" id="fabCsv"   style="background:#0ea5e9">📋 <span>CSV</span></button>
  <button class="fab-btn" id="fabPdf"   style="background:#7c3aed">📄 <span>PDFs</span></button>
  <button class="fab-btn" id="fabClear" style="background:#dc2626">🗑️ <span>Clear</span></button>
</div>

<footer>
  <span class="muted">LabIntake · v3.4 · Sagifox Dental</span>
</footer>

<script>
(() => {
  'use strict';

  const SB_URL  = 'https://nxuodoyztekbrggrpngt.supabase.co';
  const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54dW9kb3l6dGVrYnJnZ3Jwbmd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0ODQ1NzcsImV4cCI6MjEwMDA2MDU3N30.Fxth1lJsi4a76tnwZGvim7pe29Hekt6s3XxkM4iHjBM';
  const STORE   = 'labintake.entries.v1';
  const BACKUP  = '__labintake_backup_v1';
  const DOC_KEY = 'labintake.doctors.v1';
  const DEF_DOCS= ['Dr. Acosta','Dr. Bravo','Dr. Forero','Dr. Rodriguez','Dr. Secharam'];

  let sb=null, editingId=null, sortCol='entrega', sortAsc=true, mats=[], lastSaved=null;

  const $   = id => document.getElementById(id);
  const esc = s  => { const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; };
  const ymd = d  => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const uuid= () => 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});
  const fmtD= s  => { if(!s) return '—'; const d=new Date(s); if(isNaN(d)) return s; return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`; };
  const daysUntil = s => { if(!s) return null; const d=new Date(s); if(isNaN(d)) return null; const t=new Date(); t.setHours(0,0,0,0); d.setHours(0,0,0,0); return Math.round((d-t)/86400000); };
  const daysOpen  = e => { const s=e.createdAt||e.fechaEntrada; if(!s) return 0; const d=new Date(s); if(isNaN(d)) return 0; const t=new Date(); d.setHours(0,0,0,0); t.setHours(0,0,0,0); return Math.max(0,Math.round((t-d)/86400000)); };

  function readEntries(){
    const r=k=>{try{const a=JSON.parse(localStorage.getItem(k));return Array.isArray(a)?a:[];}catch(e){return[];}};
    const p=r(STORE),b=r(BACKUP);
    if(p.length===0&&b.length>0){try{localStorage.setItem(STORE,JSON.stringify(b));}catch(e){}return b;}
    return b.length>p.length?b:p;
  }
  function writeEntries(a){
    try{localStorage.setItem(STORE,JSON.stringify(a));}catch(e){}
    try{localStorage.setItem(BACKUP,JSON.stringify(a));}catch(e){}
  }
  function readDocs(){try{const a=JSON.parse(localStorage.getItem(DOC_KEY));return Array.isArray(a)&&a.length?a:DEF_DOCS.slice();}catch(e){return DEF_DOCS.slice();}}
  function writeDocs(a){try{localStorage.setItem(DOC_KEY,JSON.stringify(a));}catch(e){}}

  function renderDocs(sel){
    const el=$('doctorSelect'); if(!el) return;
    const docs=readDocs();
    el.innerHTML='<option value="">— select —</option>'+docs.map(d=>`<option value="${esc(d)}"${d===sel?' selected':''}>${esc(d)}</option>`).join('');
    if(sel) el.value=sel;
  }

  function statusOf(e){
    if(e.entregado) return {key:'sent',   label:'✅ Delivered',             color:'#16a34a',bg:'#dcfce7'};
    const d=daysUntil(e.fechaEntrega);
    if(d===null)  return {key:'?',      label:'—',                        color:'#64748b',bg:'#f1f5f9'};
    if(d<0)       return {key:'overdue',label:`🔴 ${Math.abs(d)}d overdue`,color:'#dc2626',bg:'#fee2e2'};
    if(d===0)     return {key:'today',  label:'🟡 TODAY',                  color:'#ca8a04',bg:'#fef9c3'};
    if(d===1)     return {key:'warn',   label:'🟠 Tomorrow',               color:'#ea580c',bg:'#ffedd5'};
    if(d<=7)      return {key:'week',   label:`🟢 In ${d}d`,               color:'#16a34a',bg:'#dcfce7'};
    return              {key:'future', label:`⚪ In ${d}d`,                color:'#64748b',bg:'#f1f5f9'};
  }

  function renderTable(){
    const all=readEntries();
    $('countBadge').textContent=`${all.length} case${all.length===1?'':'s'}`;
    const open=all.filter(e=>!e.entregado).length;
    const ov  =all.filter(e=>{const d=daysUntil(e.fechaEntrega);return!e.entregado&&d!==null&&d<0;}).length;
    const tod =all.filter(e=>{const d=daysUntil(e.fechaEntrega);return!e.entregado&&d===0;}).length;
    const snt =all.filter(e=>e.entregado).length;
    $('statsBar').innerHTML=
      `<span class="stat-pill total" onclick="setFilter('all')">📋 ${all.length} total</span>`+
      `<span class="stat-pill open" onclick="setFilter('open')">🔵 ${open} open</span>`+
      `<span class="stat-pill overdue" onclick="setFilter('overdue')">🔴 ${ov} overdue</span>`+
      `<span class="stat-pill today" onclick="setFilter('today')">🟡 ${tod} today</span>`+
      `<span class="stat-pill sent" onclick="setFilter('sent')">✅ ${snt} delivered</span>`;
    const filter=$('filterSelect').value;
    const search=($('searchInput').value||'').toLowerCase();
    let list=all.filter(e=>{
      if(filter==='open'   &&  e.entregado) return false;
      if(filter==='sent'   && !e.entregado) return false;
      if(filter==='overdue'){const d=daysUntil(e.fechaEntrega);if(e.entregado||d===null||d>=0) return false;}
      if(filter==='today') {const d=daysUntil(e.fechaEntrega);if(e.entregado||d!==0) return false;}
      if(search){const h=`${e.paciente||''} ${e.doctor||''} ${e.trabajo||''} ${e.notes||''}`.toLowerCase();if(!h.includes(search)) return false;}
      return true;
    });
    list.sort((a,b)=>{
      const f=sortAsc?1:-1;
      if(sortCol==='doctor')   return f*(a.doctor||'').localeCompare(b.doctor||'');
      if(sortCol==='paciente') return f*(a.paciente||'').localeCompare(b.paciente||'');
      if(sortCol==='trabajo')  return f*(a.trabajo||'').localeCompare(b.trabajo||'');
      if(sortCol==='entrega'){const da=e=>e.entregado?99999:(daysUntil(e.fechaEntrega)??9999);return f*(da(a)-da(b));}
      if(sortCol==='edad')  return f*(daysOpen(a)-daysOpen(b));
      return 0;
    });
    $('monitorCount').textContent=`${list.length} / ${all.length}`;
    const tbody=$('caseBody');
    if(list.length===0){tbody.innerHTML='';$('monitorEmpty').hidden=false;return;}
    $('monitorEmpty').hidden=true;
    tbody.innerHTML=list.map(e=>{
      const st=statusOf(e);
      const du=daysUntil(e.fechaEntrega);
      const age=daysOpen(e);
      const ageColor=age<=3?'#16a34a':age<=7?'#0891b2':age<=14?'#ca8a04':age<=30?'#ea580c':'#dc2626';
      const urgCls=e.entregado?'':du!==null&&du<0?'row-urgent':du!==null&&du<=1?'row-warning':'';
      const impTag=e.important?'<span style="background:#fef3c7;color:#92400e;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:700;margin-right:3px">⚠️</span>':'';
      const newCls=e.id===lastSaved?'new-row':'';
      const cdText=e.entregado?'✓ Done':du===null?'—':du<0?`${Math.abs(du)}d late`:du===0?'TODAY!':`${du}d`;
      const sid=esc(e.id);
      return `<tr class="${urgCls} ${newCls}" data-id="${sid}">
        <td>${esc(e.doctor||'—')}</td>
        <td><strong>${impTag}${esc(e.paciente||'—')}</strong></td>
        <td style="color:#475569">${esc(e.trabajo||'—')}</td>
        <td><span class="cd-pill" style="background:${st.bg};color:${st.color}">${cdText}</span></td>
        <td style="color:${ageColor};font-weight:600">${age}d</td>
        <td><span class="st-badge" style="background:${st.bg};color:${st.color}">${st.label}</span></td>
        <td style="text-align:right;white-space:nowrap" onclick="event.stopPropagation()">
          <button class="act-btn btn-sent" onclick="LI.toggleSent('${sid}')" title="${e.entregado?'Reopen':'Mark delivered'}">${e.entregado?'↩':'✓'}</button>
          <button class="act-btn btn-edit" onclick="LI.startEdit('${sid}')" title="Edit">✏️</button>
          <button class="act-btn btn-pdf"  onclick="LI.genPDF('${sid}')"    title="PDF">📄</button>
          <button class="act-btn btn-del"  onclick="LI.delEntry('${sid}')"  title="Delete">🗑</button>
        </td>
      </tr>`;
    }).join('');
    if(lastSaved){
      const row=tbody.querySelector(`tr[data-id="${lastSaved}"]`);
      if(row) setTimeout(()=>row.scrollIntoView({behavior:'smooth',block:'center'}),150);
      setTimeout(()=>{lastSaved=null;},4000);
    }
  }

  window.setFilter = val => { $('filterSelect').value=val; renderTable(); };

  function resetForm(){
    editingId=null;
    $('editingId').value='';
    $('formTitle').textContent='New Entry';
    $('editBanner').classList.remove('active');
    $('cancelEditBtn').hidden=true;
    $('saveBtn').textContent='💾 Save entry';
    const t=new Date();
    $('fechaEntrada').value=ymd(t);
    $('fechaEntrega').value=ymd(new Date(t.getTime()+5*86400000));
    $('trabajoInput').value='crown';
    $('pacienteInput').value='';
    renderDocs('Dr. Acosta');
    $('entryNotes').value='';
    $('entryImportant').checked=false;
    mats=[]; renderMatList();
  }

  window.LI = {
    startEdit(id){
      const e=readEntries().find(x=>x.id===id); if(!e) return;
      editingId=id;
      $('editingId').value=id;
      $('formTitle').textContent='✏️ Edit Entry';
      $('editBanner').classList.add('active');
      $('cancelEditBtn').hidden=false;
      $('saveBtn').textContent='💾 Update entry';
      $('fechaEntrada').value=(e.fechaEntrada||'').slice(0,10);
      $('fechaEntrega').value=(e.fechaEntrega||'').slice(0,10);
      renderDocs(e.doctor||'');
      $('pacienteInput').value=e.paciente||'';
      $('trabajoInput').value=e.trabajo||'';
      $('entryNotes').value=e.notes||'';
      $('entryImportant').checked=!!e.important;
      mats=Array.isArray(e.materials)?[...e.materials]:[];
      renderMatList();
      $('formCard').scrollIntoView({behavior:'smooth',block:'start'});
    },
    toggleSent(id){
      const arr=readEntries();
      const idx=arr.findIndex(x=>x.id===id); if(idx<0) return;
      arr[idx].entregado=!arr[idx].entregado;
      arr[idx].entregadoAt=arr[idx].entregado?new Date().toISOString():null;
      writeEntries(arr);
      if(sb) sb.from('entries').update({entregado:arr[idx].entregado,entregado_at:arr[idx].entregadoAt}).eq('id',id).catch(()=>{});
      renderTable();
    },
    delEntry(id){
      const arr=readEntries();
      const e=arr.find(x=>x.id===id); if(!e) return;
      if(!confirm(`Delete entry for "${e.paciente||'(no name)'}"?\n\nThis cannot be undone.`)) return;
      writeEntries(arr.filter(x=>x.id!==id));
      if(sb) sb.from('entries').delete().eq('id',id).catch(()=>{});
      if(editingId===id) resetForm();
      renderTable();
    },
    genPDF(id){
      const e=readEntries().find(x=>x.id===id); if(!e) return;
      if(!window.jspdf||!window.jspdf.jsPDF){alert('PDF library still loading, please wait a moment.');return;}
      const doc=new window.jspdf.jsPDF({unit:'mm',format:'letter'});
      renderPDF(doc,e);
      doc.save(`LabIntake_${(e.paciente||'entry').replace(/[^a-z0-9]/gi,'_').slice(0,30)}_${new Date().toISOString().slice(0,10)}.pdf`);
    }
  };

  $('entryForm').addEventListener('submit',function(ev){
    ev.preventDefault();
    const doc=$('doctorSelect').value;
    const pac=($('pacienteInput').value||'').trim();
    const trab=($('trabajoInput').value||'').trim();
    const fE=$('fechaEntrada').value;
    const fD=$('fechaEntrega').value;
    if(!doc||!pac||!trab||!fE||!fD){alert('Please fill in all required fields.');return;}
    const arr=readEntries();
    if(editingId){
      const idx=arr.findIndex(x=>x.id===editingId);
      if(idx<0){alert('Entry not found.');return;}
      arr[idx]={...arr[idx],doctor:doc,paciente:pac,trabajo:trab,fechaEntrada:fE,fechaEntrega:fD,
        notes:$('entryNotes').value||'',important:$('entryImportant').checked,materials:[...mats]};
      writeEntries(arr);
      lastSaved=editingId;
      if(sb) sb.from('entries').update({doctor:doc,paciente:pac,trabajo:trab,fecha_entrada:fE,fecha_entrega:fD,
        notes:$('entryNotes').value||'',important:$('entryImportant').checked,materials:[...mats]}).eq('id',editingId).catch(()=>{});
    } else {
      const entry={id:uuid(),fechaEntrada:fE,doctor:doc,paciente:pac,trabajo:trab,fechaEntrega:fD,
        materials:[...mats],notes:$('entryNotes').value||'',important:$('entryImportant').checked,
        entregado:false,entregadoAt:null,createdAt:new Date().toISOString()};
      arr.push(entry); writeEntries(arr);
      lastSaved=entry.id;
      if(sb) sb.from('entries').insert({id:entry.id,fecha_entrada:fE,doctor:doc,paciente:pac,trabajo:trab,
        fecha_entrega:fD,materials:[...mats],notes:entry.notes,important:entry.important,
        entregado:false,entregado_at:null}).catch(()=>{});
    }
    const btn=$('saveBtn');
    btn.textContent='✓ Saved!'; btn.disabled=true;
    setTimeout(()=>{btn.textContent='💾 Save entry';btn.disabled=false;},1400);
    resetForm();
    renderTable();
    setTimeout(()=>$('monitorCard').scrollIntoView({behavior:'smooth',block:'start'}),120);
  });

  function renderMatList(){
    const ul=$('matList'); ul.innerHTML='';
    if(!mats.length){ul.hidden=true;return;}
    ul.hidden=false;
    mats.forEach((m,i)=>{
      const li=document.createElement('li'); li.className='mat-chip';
      li.innerHTML='<span class="mat-text"></span><button type="button" class="mat-rm">×</button>';
      li.querySelector('.mat-text').textContent=`${m.name}${m.qty?` × ${m.qty}`:''}${m.unit?` ${m.unit}`:''}`;
      li.querySelector('.mat-rm').onclick=()=>{mats.splice(i,1);renderMatList();};
      ul.appendChild(li);
    });
  }
  $('addMatBtn').onclick=()=>{
    const n=$('matName').value.trim(); if(!n){$('matName').focus();return;}
    mats.push({name:n,qty:$('matQty').value.trim(),unit:$('matUnit').value.trim()});
    renderMatList(); $('matName').value=''; $('matQty').value=''; $('matUnit').value=''; $('matName').focus();
  };

  $('toggleNewDoc').onclick=()=>{$('newDocRow').hidden=false;$('newDocInput').focus();};
  $('cancelDocBtn').onclick=()=>{$('newDocRow').hidden=true;$('newDocInput').value='';};
  $('saveDocBtn').onclick=()=>{
    const name=($('newDocInput').value||'').trim(); if(!name) return;
    const docs=readDocs();
    if(docs.some(d=>d.toLowerCase()===name.toLowerCase())){alert(`${name} is already in the list.`);return;}
    docs.push(name); writeDocs(docs); renderDocs(name);
    $('newDocRow').hidden=true; $('newDocInput').value='';
    if(sb) sb.from('doctors').insert({name}).catch(()=>{});
  };
  $('cancelEditBtn').onclick=resetForm;

  document.querySelectorAll('.case-table th[data-sort]').forEach(th=>{
    th.onclick=()=>{const col=th.dataset.sort;if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}renderTable();};
  });
  $('filterSelect').onchange=renderTable;
  $('searchInput').oninput=renderTable;

  function renderPDF(doc,e){
    doc.setFillColor(15,23,42);doc.rect(0,0,216,30,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(22);doc.setFont('helvetica','bold');doc.text('LAB INTAKE',15,18);
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text('Sagifox - Dental Lab Entry Record',15,24);
    doc.setTextColor(180,180,180);doc.setFontSize(9);doc.text('Generated: '+new Date().toLocaleString(),130,24);
    let y=44;
    if(e.important){doc.setFillColor(254,243,199);doc.setDrawColor(217,119,6);doc.roundedRect(15,y,70,11,2,2,'FD');doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(146,64,14);doc.text('!! IMPORTANT',18,y+7.5);y+=16;}
    if(e.entregado){doc.setFillColor(220,252,231);doc.setDrawColor(22,101,52);doc.roundedRect(15,y,60,11,2,2,'FD');doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(22,101,52);doc.text('DELIVERED',18,y+7.5);y+=16;}
    y+=4;
    [['Doctor / Clinic',e.doctor],['Patient',e.paciente],['Restoration',e.trabajo],['Entry date',fmtD(e.fechaEntrada)],['Delivery date',fmtD(e.fechaEntrega)]].forEach(([l,v])=>{
      doc.setFontSize(9);doc.setTextColor(100,116,139);doc.setFont('helvetica','normal');doc.text(l+':',15,y);
      doc.setFontSize(12);doc.setTextColor(15,23,42);doc.setFont('helvetica','bold');doc.text(String(v||'—'),65,y);y+=9;
    });
    if(e.notes){y+=4;doc.setFontSize(9);doc.setTextColor(100,116,139);doc.text('NOTES:',15,y);y+=5;doc.setFontSize(10);doc.setTextColor(15,23,42);const ls=doc.splitTextToSize(e.notes,180);doc.text(ls,15,y);y+=ls.length*5+2;}
    if(Array.isArray(e.materials)&&e.materials.length){y+=4;doc.setFontSize(9);doc.setTextColor(100,116,139);doc.text('MATERIALS:',15,y);y+=5;e.materials.forEach(m=>{doc.setFontSize(10);doc.setTextColor(15,23,42);doc.text(`- ${m.name||''}${m.qty?' x '+m.qty:''}${m.unit?' '+m.unit:''}`,18,y);y+=7;});}
    doc.setDrawColor(200,200,200);doc.line(15,270,200,270);
    doc.setFontSize(8);doc.setTextColor(150,150,150);
    doc.text('ID: '+(e.id||'—'),15,275);
    if(e.createdAt) doc.text('Created: '+fmtD(e.createdAt),15,280);
  }

  async function doSync(){
    if(!sb){
      const stel=$('syncStatus');
      if(stel){stel.className='sync-err';stel.style.display='inline-block';stel.textContent='✗ No connection';}
      return -1;
    }
    const stel=$('syncStatus');
    if(stel){stel.className='sync-loading';stel.style.display='inline-block';stel.textContent='↻ Syncing…';}
    try{
      const {data,error}=await sb.from('entries').select('*').order('fecha_entrega',{ascending:true});
      if(error) throw error;
      const remote=(data||[]).map(row=>({id:row.id,fechaEntrada:row.fecha_entrada,doctor:row.doctor,
        paciente:row.paciente,trabajo:row.trabajo,fechaEntrega:row.fecha_entrega,
        materials:row.materials||[],notes:row.notes||'',important:!!row.important,
        entregado:!!row.entregado,entregadoAt:row.entregado_at,createdAt:row.created_at}));
      const local=readEntries();
      const remoteIds=new Set(remote.map(e=>e.id));
      const merged=[...remote];
      local.forEach(e=>{if(!remoteIds.has(e.id)) merged.push(e);});
      writeEntries(merged);
      const missing=local.filter(e=>!remoteIds.has(e.id));
      for(const e of missing){
        await sb.from('entries').insert({id:e.id,fecha_entrada:e.fechaEntrada,doctor:e.doctor,
          paciente:e.paciente,trabajo:e.trabajo,fecha_entrega:e.fechaEntrega,
          materials:e.materials||[],notes:e.notes||'',important:!!e.important,
          entregado:!!e.entregado,entregado_at:e.entregadoAt||null}).catch(()=>{});
      }
      if(stel){stel.className='sync-ok';stel.textContent=`✓ ${merged.length} cases`;}
      renderTable();
      return merged.length;
    }catch(err){
      console.error('sync error:',err);
      if(stel){stel.className='sync-err';stel.textContent='✗ Sync error';}
      return -1;
    }
  }

  $('fabExcel').onclick=()=>{
    if(!window.XLSX){alert('Excel library still loading…');return;}
    const arr=readEntries(); if(!arr.length){alert('No data to export.');return;}
    const rows=arr.map(e=>({'Entry Date':e.fechaEntrada||'','Delivery Date':e.fechaEntrega||'',
      'Doctor':e.doctor||'','Patient':e.paciente||'','Restoration':e.trabajo||'','Notes':e.notes||'',
      'Important':e.important?'YES':'','Delivered':e.entregado?'YES':'',
      'Delivered On':e.entregadoAt?fmtD(e.entregadoAt):'',
      'Materials':(e.materials||[]).map(m=>`${m.qty||''} ${m.unit||''} ${m.name||''}`).join('; '),
      'Created':e.createdAt?fmtD(e.createdAt):''}));
    const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'LabIntake');
    XLSX.writeFile(wb,`LabIntake_${new Date().toISOString().slice(0,10)}.xlsx`);
  };
  $('fabCsv').onclick=()=>{
    const arr=readEntries(); if(!arr.length){alert('No data.');return;}
    const hdr=['Entry Date','Delivery Date','Doctor','Patient','Restoration','Notes','Important','Delivered','Delivered On','Materials','Created'];
    const rows=arr.map(e=>[e.fechaEntrada||'',e.fechaEntrega||'',e.doctor||'',e.paciente||'',e.trabajo||'',
      (e.notes||'').replace(/"/g,'""'),e.important?'YES':'',e.entregado?'YES':'',
      e.entregadoAt?fmtD(e.entregadoAt):'',
      (e.materials||[]).map(m=>`${m.qty||''} ${m.unit||''} ${m.name||''}`).join('; '),
      e.createdAt?fmtD(e.createdAt):'']);
    const csv=[hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}));
    a.download=`LabIntake_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  };
  $('fabPdf').onclick=()=>{
    const arr=readEntries(); if(!arr.length){alert('No data.');return;}
    if(!window.jspdf||!window.jspdf.jsPDF){alert('PDF library still loading…');return;}
    let doc=null;
    arr.forEach((e,i)=>{if(i===0) doc=new window.jspdf.jsPDF({unit:'mm',format:'letter'}); else doc.addPage(); renderPDF(doc,e);});
    doc.save(`LabIntake_All_${new Date().toISOString().slice(0,10)}.pdf`);
  };
  $('fabSync').onclick=async()=>{
    const btn=$('fabSync');
    btn.innerHTML='⏳ <span>Syncing…</span>'; btn.disabled=true;
    const n=await doSync();
    btn.innerHTML=n<0?'❌ <span>Error</span>':`✅ <span>${n} cases</span>`;
    btn.disabled=false;
    setTimeout(()=>{btn.innerHTML='☁️ <span>Sync</span>';},3000);
  };
  $('fabClear').onclick=()=>{
    if(!confirm('Delete ALL local entries?\n(Cloud data is NOT affected — press Sync to restore them.)')) return;
    writeEntries([]); renderTable(); alert('Cleared');
  };

  async function boot(){
    try{
      if(window.supabase&&window.supabase.createClient){
        sb=window.supabase.createClient(SB_URL,SB_KEY);
        console.log('Supabase client initialized');
      }
    }catch(e){console.warn('Supabase init error:',e);}
    resetForm();
    renderTable();
    if(sb) await doSync();
    setInterval(renderTable,30000);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);
  else boot();

})();
</script>
